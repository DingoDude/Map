<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Global Traffic Controller</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <h3>Space Control</h3>
        <button onclick="flyToSat('iss')">Find ISS</button>
        <button onclick="flyToSat('tiangong')">Find Tiangong</button>
        
        <h3>Layers</h3>
        <label class="layer-item"><input type="checkbox" id="toggle-sat" checked> Satellitter (Live)</label>
        <label class="layer-item"><input type="checkbox" id="toggle-planes" checked> Flytrafik (Live OpenSky)</label>
        <label class="layer-item"><input type="checkbox" id="toggle-ships" checked> Skibstrafik (Live AIS)</label>
    </div>

    <div id="altitude-display">Højde: Henter...</div>
    <div id="cesiumContainer"></div>
    
    <script src="script.js"></script>
</body>
</html>
